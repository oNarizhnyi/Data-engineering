version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ad_db_hw2
    environment:
      MYSQL_DATABASE: my_db
      MYSQL_ROOT_PASSWORD: password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    ports:
      - "3307:3306"
    volumes:
      - ./init_db:/docker-entrypoint-initdb.d

  reporter_service:
    build: .
    container_name: python_reporter
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: my_db
      DB_USER: root
      DB_PASSWORD: password
    restart: on-failure